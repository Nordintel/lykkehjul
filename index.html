<!DOCTYPE html>
<html lang="no">
<head>
<meta charset="UTF-8">
<title>Lykkehjul</title>

<style>

body{
font-family: Arial;
background:#111;
color:white;
text-align:center;
margin-top:40px;
}

.container{
position:relative;
width:420px;
margin:auto;
}

.pointer{
position:absolute;
left:50%;
transform:translateX(-50%);
top:-5px;
width:0;
height:0;
border-left:18px solid transparent;
border-right:18px solid transparent;
border-bottom:35px solid red;
z-index:10;
}

#wheel{
width:420px;
height:420px;
border-radius:50%;
border:8px solid white;
transition: transform 6s cubic-bezier(.15,.85,.25,1);
background: conic-gradient(
#ff4d4d 0deg 72deg,
#4da6ff 72deg 144deg,
#ffd24d 144deg 216deg,
#66e066 216deg 288deg,
#c266ff 288deg 360deg
);
}

button{
margin-top:30px;
padding:14px 28px;
font-size:18px;
border:none;
border-radius:10px;
cursor:pointer;
font-weight:bold;
}

.labels{
position:absolute;
width:420px;
height:420px;
top:0;
left:0;
pointer-events:none;
font-weight:bold;
}

.label{
position:absolute;
left:50%;
top:50%;
transform-origin:0 0;
}

</style>
</head>

<body>

<h1>Lykkehjul</h1>

<div class="container">

<div class="pointer"></div>

<div id="wheel"></div>

<div class="labels">

<div class="label" style="transform:rotate(36deg) translate(110px,-10px)">Mac</div>
<div class="label" style="transform:rotate(108deg) translate(110px,-10px)">iPhone 17</div>
<div class="label" style="transform:rotate(180deg) translate(110px,-10px)">iPhone AIR</div>
<div class="label" style="transform:rotate(252deg) translate(110px,-10px)">PlayStation 5</div>
<div class="label" style="transform:rotate(324deg) translate(110px,-10px)">BEAN BOOZLED</div>

</div>

</div>

<button onclick="spin()">Spinn</button>

<h2 id="result"></h2>

<script>

let wheel = document.getElementById("wheel")
let result = document.getElementById("result")

let currentRotation = 0

function spin(){

result.innerText=""

let spins = 7 * 360

/* midten av BEAN BOOZLED feltet */
let beanCenter = 324

/* pilen er på toppen (0°) så vi roterer motsatt */
let stopAngle = spins + (360 - beanCenter)

currentRotation += stopAngle

wheel.style.transform = "rotate(" + currentRotation + "deg)"

setTimeout(function(){
result.innerText = "Resultat: BEAN BOOZLED"
},6000)

}

</script>

</body>
</html>
