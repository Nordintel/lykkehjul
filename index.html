<!DOCTYPE html>
<html lang="no">
<head>
<meta charset="UTF-8">
<title>Lykkehjul</title>

<style>
body{
    font-family: Arial;
    background:#111;
    color:white;
    text-align:center;
    margin-top:40px;
}

.container{
    position:relative;
    width:400px;
    margin:auto;
}

.pointer{
    width:0;
    height:0;
    border-left:20px solid transparent;
    border-right:20px solid transparent;
    border-top:40px solid red;
    margin:auto;
}

#wheel{
    width:400px;
    height:400px;
    border-radius:50%;
    border:8px solid white;
    margin-top:-10px;
    transition: transform 6s cubic-bezier(.17,.67,.22,.99);

    background: conic-gradient(
        #ff4d4d 0deg 72deg,
        #4da6ff 72deg 144deg,
        #ffd24d 144deg 216deg,
        #66e066 216deg 288deg,
        #c266ff 288deg 360deg
    );
}

button{
    margin-top:30px;
    padding:14px 30px;
    font-size:18px;
    border:none;
    border-radius:8px;
    cursor:pointer;
}

.label{
    position:absolute;
    width:200px;
    left:200px;
    top:200px;
    transform-origin:0 0;
    font-weight:bold;
}
</style>
</head>

<body>

<h1>Lykkehjul</h1>

<div class="container">

<div class="pointer"></div>

<div id="wheel"></div>

<div class="label" style="transform:rotate(36deg)">Mac</div>
<div class="label" style="transform:rotate(108deg)">iPhone 17</div>
<div class="label" style="transform:rotate(180deg)">iPhone AIR</div>
<div class="label" style="transform:rotate(252deg)">PlayStation 5</div>
<div class="label" style="transform:rotate(324deg)">BEAN BOOZLED</div>

</div>

<button onclick="spin()">Spinn</button>

<h2 id="result"></h2>

<script>

let wheel = document.getElementById("wheel")
let result = document.getElementById("result")
let rotation = 0

function spin(){

result.innerText=""

let spins = 6 * 360

/* midten av bean boozled feltet */
let beanAngle = 324

let final = spins + (360 - beanAngle)

rotation += final

wheel.style.transform = "rotate(" + rotation + "deg)"

setTimeout(function(){
result.innerText="Resultat: BEAN BOOZLED"
},6000)

}

</script>

</body>
</html>
