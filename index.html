<!DOCTYPE html>
<html lang="no">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Lykkehjul</title>
  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #111;
      color: white;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
    }

    h1 {
      margin-bottom: 20px;
    }

    .wheel-wrapper {
      position: relative;
      width: 420px;
      height: 420px;
    }

    .pointer {
      position: absolute;
      top: -6px;
      left: 50%;
      transform: translateX(-50%);
      width: 0;
      height: 0;
      border-left: 20px solid transparent;
      border-right: 20px solid transparent;
      border-top: 38px solid red;
      z-index: 20;
    }

    .wheel {
      position: relative;
      width: 100%;
      height: 100%;
      border-radius: 50%;
      border: 8px solid white;
      overflow: hidden;
      transition: transform 6s cubic-bezier(0.17, 0.67, 0.22, 1);
      background: conic-gradient(
        #ff4d4d 0deg 72deg,
        #4da6ff 72deg 144deg,
        #ffd24d 144deg 216deg,
        #66e066 216deg 288deg,
        #c266ff 288deg 360deg
      );
    }

    .label {
      position: absolute;
      left: 50%;
      top: 50%;
      transform-origin: 0 0;
      width: 120px;
      margin-left: -10px;
      text-align: left;
      font-weight: bold;
      font-size: 16px;
      color: white;
      text-shadow: 1px 1px 3px rgba(0,0,0,0.8);
      white-space: nowrap;
    }

    button {
      margin-top: 30px;
      padding: 14px 26px;
      font-size: 18px;
      font-weight: bold;
      border: none;
      border-radius: 10px;
      cursor: pointer;
    }

    #result {
      margin-top: 22px;
      font-size: 26px;
      font-weight: bold;
    }
  </style>
</head>
<body>
  <h1>Lykkehjul</h1>

  <div class="wheel-wrapper">
    <div class="pointer"></div>

    <div class="wheel" id="wheel">
      <div class="label" style="transform: rotate(36deg) translate(70px, -8px);">Mac</div>
      <div class="label" style="transform: rotate(108deg) translate(70px, -8px);">iPhone 17</div>
      <div class="label" style="transform: rotate(180deg) translate(70px, -8px);">iPhone AIR</div>
      <div class="label" style="transform: rotate(252deg) translate(70px, -8px);">PlayStation 5</div>
      <div class="label" style="transform: rotate(324deg) translate(70px, -8px);">BEAN BOOZLED</div>
    </div>
  </div>

  <button onclick="spinWheel()">Spinn</button>
  <div id="result"></div>

  <script>
    const wheel = document.getElementById("wheel");
    const result = document.getElementById("result");
    let currentRotation = 0;

    function spinWheel() {
      result.textContent = "";

      const spins = 6 * 360;

      // Midten av BEAN BOOZLED-feltet er 324 grader
      // Pilen står fast på toppen ved 270 grader i conic-gradient-systemet
      // Derfor må vi rotere så 324 havner på 270
      const beanCenter = 324;
      const pointerAngle = 270;

      let stopRotation = pointerAngle - beanCenter;
      if (stopRotation < 0) {
        stopRotation += 360;
      }

      currentRotation += spins + stopRotation;

      wheel.style.transform = `rotate(${currentRotation}deg)`;

      setTimeout(() => {
        result.textContent = "Resultat: BEAN BOOZLED";
      }, 6000);
    }
  </script>
</body>
</html>
